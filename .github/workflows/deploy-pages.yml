name: Deploy DevOps Learn to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "devops-learn/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: devops-learn/package-lock.json

      - name: Install dependencies
        working-directory: devops-learn
        run: npm ci

      - name: Build static site
        working-directory: devops-learn
        run: npm run build
        env:
          BASE_PATH: /devops-exercises

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: devops-learn/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
